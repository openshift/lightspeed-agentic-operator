apiVersion: v1
kind: Service
metadata:
  name: agentic-operator-webhook-service
  namespace: __OPERATOR_NAMESPACE__
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: agentic-operator-webhook-certs
spec:
  ports:
    - port: 443
      targetPort: 9443
      protocol: TCP
  selector:
    control-plane: controller-manager
