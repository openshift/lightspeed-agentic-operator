---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: agentic-product-e2e-pipeline
spec:
  description: |
    Runs lightspeed-agentic-operator product e2e tests on an ephemeral OpenShift cluster (EaaS).
    Deploys the operator with the real sandbox image from SNAPSHOT, then runs
    scripts/e2e-cluster.sh against all LLM providers (Claude, Gemini, OpenAI)
    with live credentials from Konflux workspace secrets.
  params:
    - name: SNAPSHOT
      description: 'The JSON string representing the snapshot of the application under test.'
      default: '{"components": [{"name":"test-app", "containerImage": "quay.io/example/repo:latest"}]}'
      type: string
    - name: test-name
      description: 'The name of the test corresponding to a defined Konflux integration test.'
      default: 'agentic-product-e2e'
      type: string
    - name: namespace
      description: 'Namespace to deploy the operator into'
      default: 'openshift-lightspeed'
      type: string
    - name: openshift-version-prefix
      description: 'Minor line prefix for eaas-get-latest-openshift-version-by-prefix (include trailing dot, e.g. 4.19.)'
      default: '4.19.'
      type: string
  tasks:
    - name: eaas-provision-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerKind
          value: PipelineRun
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
    - name: provision-cluster
      runAfter:
        - eaas-provision-space
      params:
        - name: openshift-version-prefix
          value: $(params.openshift-version-prefix)
      taskSpec:
        params:
          - name: openshift-version-prefix
            type: string
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        steps:
          - name: pick-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "$(params.openshift-version-prefix)"
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: version
                value: "$(steps.pick-version.results.version)"
              - name: instanceType
                value: "m5.large"
    - name: deploy-and-test
      description: Deploy operator with real sandbox, run product e2e against all LLM providers.
      runAfter:
        - provision-cluster
      taskSpec:
        params:
          - name: SNAPSHOT
            type: string
          - name: namespace
            type: string
        results:
          - name: commit
            value: "$(steps.extract-images.results.commit)"
        volumes:
          - name: credentials
            emptyDir: {}
          - name: vertex-creds
            secret:
              secretName: vertex-apitoken
          - name: openai-creds
            secret:
              secretName: openai
          - name: ols-konflux-artifacts-bot-creds
            secret:
              secretName: ols-konflux-artifacts-bot
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.eaas-provision-space.results.secretRef)
              - name: clusterName
                value: "$(tasks.provision-cluster.results.clusterName)"
              - name: credentials
                value: credentials
          - name: extract-images
            results:
              - name: commit
                type: string
              - name: operator-image
                type: string
              - name: sandbox-image
                type: string
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: KONFLUX_COMPONENT_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['appstudio.openshift.io/component']
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              set -euo pipefail
              dnf -y install jq

              OPERATOR_IMAGE="$(jq -r --arg cn "${KONFLUX_COMPONENT_NAME}" \
                '.components[] | select(.name == $cn) | .containerImage' <<< "$SNAPSHOT")"
              if [ -z "$OPERATOR_IMAGE" ] || [ "$OPERATOR_IMAGE" = "null" ]; then
                echo "ERROR: could not extract operator image from SNAPSHOT"
                exit 1
              fi

              COMMIT="$(jq -r --arg cn "${KONFLUX_COMPONENT_NAME}" \
                '.components[] | select(.name == $cn) | .source.git.revision' <<< "$SNAPSHOT")"
              if [ -z "$COMMIT" ] || [ "$COMMIT" = "null" ]; then
                echo "ERROR: could not extract git revision from SNAPSHOT"
                exit 1
              fi

              SANDBOX_IMAGE="$(jq -r \
                '.components[] | select(.name == "lightspeed-agentic-sandbox") | .containerImage' <<< "$SNAPSHOT")"
              if [ -z "$SANDBOX_IMAGE" ] || [ "$SANDBOX_IMAGE" = "null" ]; then
                SANDBOX_IMAGE="quay.io/openshift-lightspeed/lightspeed-agentic-sandbox:latest"
                echo "WARN: sandbox component not in SNAPSHOT, falling back to ${SANDBOX_IMAGE}"
              fi

              echo "OPERATOR_IMAGE=${OPERATOR_IMAGE}"
              echo "SANDBOX_IMAGE=${SANDBOX_IMAGE}"
              echo "COMMIT=${COMMIT}"

              echo -n "${COMMIT}" > $(step.results.commit.path)
              echo -n "${OPERATOR_IMAGE}" > $(step.results.operator-image.path)
              echo -n "${SANDBOX_IMAGE}" > $(step.results.sandbox-image.path)
          - name: install-operator
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: NAMESPACE
                value: "$(params.namespace)"
              - name: COMMIT
                value: "$(steps.extract-images.results.commit)"
              - name: IMG
                value: "$(steps.extract-images.results.operator-image)"
              - name: SANDBOX_IMAGE
                value: "$(steps.extract-images.results.sandbox-image)"
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              set -euo pipefail
              dnf -y install jq git make golang

              git clone --depth=1 https://github.com/openshift/lightspeed-agentic-operator.git /workspace/repo
              cd /workspace/repo
              git fetch --depth=1 origin "${COMMIT}"
              git checkout "${COMMIT}"

              IMG="${IMG}" \
              OPERATOR_NAMESPACE="${NAMESPACE}" \
              SANDBOX_IMAGE="${SANDBOX_IMAGE}" \
              bash .tekton/integration-tests/scripts/install-operator.sh
          - name: run-product-e2e
            resources:
              requests:
                memory: "8Gi"
              limits:
                memory: "8Gi"
            onError: continue
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: vertex-creds
                mountPath: /var/run/credentials/vertex
              - name: openai-creds
                mountPath: /var/run/credentials/openai
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: OPERATOR_NAMESPACE
                value: "$(params.namespace)"
              - name: SANDBOX_IMAGE
                value: "$(steps.extract-images.results.sandbox-image)"
              - name: VERTEX_PROVIDER_KEY_PATH
                value: "/var/run/credentials/vertex/token"
              - name: VERTEX_PROJECT_ID
                value: "openshift-lightspeed-tests"
              - name: OPENAI_PROVIDER_KEY_PATH
                value: "/var/run/credentials/openai/token"
              - name: ARTIFACT_DIR
                value: "/workspace/konflux-artifacts"
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              set -euo pipefail
              dnf -y install git make golang
              cd /workspace/repo
              mkdir -p "${ARTIFACT_DIR}"
              make product-e2e 2>&1 | tee "${ARTIFACT_DIR}/product-e2e-output.log"
          - name: gather-cluster-resources
            onError: continue
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            env:
              - name: KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: ARTIFACT_DIR
                value: "/workspace/konflux-artifacts"
              - name: NAMESPACE
                value: "$(params.namespace)"
            image: quay.io/konflux-qe-incubator/konflux-qe-tools:latest
            script: |
              #!/bin/bash
              set -x
              cd "${ARTIFACT_DIR}"
              oc get proposals -A -o yaml > proposals.yaml 2>/dev/null || true
              oc get proposalapprovals -A -o yaml > proposalapprovals.yaml 2>/dev/null || true
              oc get analysisresults -A -o yaml > analysisresults.yaml 2>/dev/null || true
              oc get executionresults -A -o yaml > executionresults.yaml 2>/dev/null || true
              oc get verificationresults -A -o yaml > verificationresults.yaml 2>/dev/null || true
              oc get pods -n "${NAMESPACE}" -o yaml > pods.yaml 2>/dev/null || true
              oc logs -n "${NAMESPACE}" deployment/controller-manager --tail=500 > operator-logs.txt 2>/dev/null || true
              echo "Artifacts gathered:"
              ls -la "${ARTIFACT_DIR}"
          - name: list-artifacts
            onError: continue
            image: quay.io/konflux-qe-incubator/konflux-qe-tools:latest
            workingDir: /workspace/konflux-artifacts
            script: |
              #!/bin/bash
              echo "=== Artifacts to push ==="
              ls -la /workspace/konflux-artifacts
          - name: push-artifacts
            onError: continue
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/tekton-integration-catalog.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
            params:
              - name: workdir-path
                value: /workspace/konflux-artifacts
              - name: oci-ref
                value: "quay.io/openshift-lightspeed/ols-operator-artifacts:agentic-product-e2e-$(steps.extract-images.results.commit)"
              - name: credentials-volume-name
                value: ols-konflux-artifacts-bot-creds
          - name: fail-if-any-step-failed
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/tekton-integration-catalog.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/fail-if-any-step-failed/0.1/fail-if-any-step-failed.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: namespace
          value: "$(params.namespace)"
  finally:
    - name: export-logs-for-retention
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/export-logs/0.1/export-logs-to-quay.yaml
      params:
        - name: pipeline-run-name
          value: $(context.pipelineRun.name)
        - name: namespace
          value: $(context.pipelineRun.namespace)
        - name: quay-repo
          value: "quay.io/openshift-lightspeed/ols-operator-artifacts"
        - name: artifact-credentials-secret
          value: ols-konflux-artifacts-bot
