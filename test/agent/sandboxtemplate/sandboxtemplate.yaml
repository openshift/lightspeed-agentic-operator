apiVersion: v1
kind: ServiceAccount
metadata:
  name: lightspeed-agent
  namespace: default
automountServiceAccountToken: false
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: lightspeed-agent
  namespace: default
spec:
  networkPolicyManagement: Unmanaged
  podTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: lightspeed-mock-agent
    spec:
      serviceAccountName: lightspeed-agent
      automountServiceAccountToken: false
      containers:
        - name: agent
          image: quay.io/openshift-lightspeed/ols-qe:lightspeed-mock-agent-metric
          args: ["-addr", ":8080"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      volumes:
        - name: skills
          image:
            reference: placeholder:latest
