# Vertex AI with Google (Gemini) models.
#
# Before applying, create the credentials secret:
#   oc create secret generic llm-creds-vertex -n openshift-lightspeed \
#     --from-file=GOOGLE_APPLICATION_CREDENTIALS=/path/to/your/adc.json
#
# Then edit this file: replace <YOUR_GCP_PROJECT_ID> with your GCP project ID.
apiVersion: agentic.openshift.io/v1alpha1
kind: LLMProvider
metadata:
  name: vertex-google
spec:
  type: GoogleCloudVertex
  googleCloudVertex:
    projectID: "<YOUR_GCP_PROJECT_ID>"
    region: "us-east5"
    modelProvider: Google
    credentialsSecret:
      name: llm-creds-vertex
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: default
spec:
  llmProvider:
    name: vertex-google
  model: "gemini-2.5-flash"
  timeouts:
    analysisSeconds: 120
    executionSeconds: 120
    verificationSeconds: 120
