# Azure OpenAI Service.
#
# Before applying, create the credentials secret:
#   oc create secret generic llm-creds-azure -n openshift-lightspeed \
#     --from-literal=AZURE_OPENAI_API_KEY=...
#
# Then edit this file: replace <YOUR_AZURE_ENDPOINT> and <YOUR_API_VERSION>.
apiVersion: agentic.openshift.io/v1alpha1
kind: LLMProvider
metadata:
  name: azure
spec:
  type: AzureOpenAI
  azureOpenAI:
    endpoint: "<YOUR_AZURE_ENDPOINT>"
    apiVersion: "2024-02-01"
    credentialsSecret:
      name: llm-creds-azure
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: default
spec:
  llmProvider:
    name: azure
  model: "<YOUR_DEPLOYMENT_NAME>"
  timeouts:
    analysisSeconds: 120
    executionSeconds: 120
    verificationSeconds: 120
