# AWS Bedrock.
#
# Before applying, create the credentials secret:
#   oc create secret generic llm-creds-bedrock -n openshift-lightspeed \
#     --from-literal=AWS_ACCESS_KEY_ID=... \
#     --from-literal=AWS_SECRET_ACCESS_KEY=...
#
# Then edit this file: replace <YOUR_AWS_REGION> and model if needed.
apiVersion: agentic.openshift.io/v1alpha1
kind: LLMProvider
metadata:
  name: bedrock
spec:
  type: AWSBedrock
  awsBedrock:
    region: "<YOUR_AWS_REGION>"
    credentialsSecret:
      name: llm-creds-bedrock
---
apiVersion: agentic.openshift.io/v1alpha1
kind: Agent
metadata:
  name: default
spec:
  llmProvider:
    name: bedrock
  model: "anthropic.claude-sonnet-4-20250514-v1:0"
  timeouts:
    analysisSeconds: 120
    executionSeconds: 120
    verificationSeconds: 120
